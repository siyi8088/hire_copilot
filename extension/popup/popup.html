<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400, initial-scale=1.0">
  <title>猎头 Copilot</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- 头部 -->
    <header class="header">
      <div class="logo-area">
        <div class="logo-icon">🤖</div>
        <div class="logo-text">
          <h1>猎头 Copilot</h1>
          <span class="version" id="versionText">v0.2.0</span>
        </div>
      </div>
      <div id="connectionDot" class="connection-dot offline" title="后端未连接"></div>
    </header>

    <!-- 主开关 -->
    <section class="control-section">
      <div class="toggle-row">
        <span class="toggle-label">自动回复</span>
        <label class="toggle-switch">
          <input type="checkbox" id="toggleEnabled">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <p id="statusText" class="status-text">未启用</p>
    </section>

    <!-- 统计信息 -->
    <section class="stats-section">
      <h2 class="section-title">今日统计</h2>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="statReceived">0</div>
          <div class="stat-label">收到消息</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statReplied">0</div>
          <div class="stat-label">已回复</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statResumes">0</div>
          <div class="stat-label">收到简历</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statErrors">0</div>
          <div class="stat-label">异常</div>
        </div>
      </div>
    </section>

    <!-- DOM 校准状态 -->
    <section class="calibration-section">
      <h2 class="section-title">📡 DOM 校准</h2>
      <div class="calibration-grid">
        <div class="cal-item" id="calRowJobSyncer">
          <span class="cal-dot" id="calDotJobSyncer">⏳</span>
          <span class="cal-label">职位同步</span>
          <span class="cal-status" id="calStatusJobSyncer">未检测</span>
          <button class="cal-btn" id="calBtnJobSyncer" title="校准职位同步模块">校准</button>
        </div>
        <div class="cal-item" id="calRowRecommend">
          <span class="cal-dot" id="calDotRecommend">⏳</span>
          <span class="cal-label">推荐牛人</span>
          <span class="cal-status" id="calStatusRecommend">未检测</span>
          <button class="cal-btn" id="calBtnRecommend" title="校准推荐牛人模块">校准</button>
        </div>
        <div class="cal-item" id="calRowChatObserver">
          <span class="cal-dot" id="calDotChatObserver">⏳</span>
          <span class="cal-label">聊天列表</span>
          <span class="cal-status" id="calStatusChatObserver">未检测</span>
          <button class="cal-btn" id="calBtnChatObserver" title="校准聊天列表模块">校准</button>
        </div>
        <div class="cal-item" id="calRowChatConversation">
          <span class="cal-dot" id="calDotChatConversation">⏳</span>
          <span class="cal-label">聊天对话</span>
          <span class="cal-status" id="calStatusChatConversation">未检测</span>
          <button class="cal-btn" id="calBtnChatConversation" title="在已点开候选人对话时校准">校准</button>
        </div>
      </div>
    </section>

    <!-- 运行时长 -->
    <section class="runtime-section">
      <div class="runtime-row">
        <span>运行时长</span>
        <span id="runtime">--:--:--</span>
      </div>
      <div class="runtime-row">
        <span>当前聊天</span>
        <span id="currentChat">无</span>
      </div>
    </section>

    <!-- 操作按钮 -->
    <section class="actions-section">
      <button id="btnReconnect" class="btn btn-secondary" title="重新连接后端">
        🔄 重连后端
      </button>
      <button id="btnOpenDashboard" class="btn btn-primary" title="打开管理面板">
        📊 管理面板
      </button>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
